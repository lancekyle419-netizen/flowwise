# Alembic configuration file, generated by Alembic.
# Editing this file is usually not necessary; it's used by the generate_migration.py
# script and you can use the revision command to auto-generate new migration scripts.

# path to migration scripts
script_location = alembic

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
#file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
sys.path.insert(0, os.path.dirname(os.path.dirname(os.path.realpath(__file__))))

# timezone to use when rendering the migration date
# within the migration file as well as the filename.
# string value is passed to zoneinfo.ZoneInfo()
# leave blank for localtime
# timezone =

# max length of characters to apply to the
# "slug" field of the migration file name template
# (default is empty, with no maximum length)
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'upgrade' and 'downgrade' operations.
onaffect_ddl = true

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
always = false

# determines how to compare types. Read the docs for the current behavior
# new models will use 'records' by default; this is equivalent to the first behavior
# in 0.5.x; the second behavior in later versions becomes the default
compare_type = false

# determines what src of diffs to generate when
# autogenerate is enabled. Read the docs to understand auto generation.
compare_server_default = false

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
