version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: flowwise_postgres
    environment:
      POSTGRES_USER: flowwise
      POSTGRES_PASSWORD: password
      POSTGRES_DB: flowwise
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowwise"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flowwise_backend
    environment:
      DATABASE_URL: postgresql://flowwise:password@postgres:5432/flowwise
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_DEBUG: "True"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: flowwise_frontend
    environment:
      REACT_APP_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm start

volumes:
  postgres_data:
